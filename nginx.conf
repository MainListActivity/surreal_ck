worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Increase body size limit for file uploads (plan: max 20MB client-side + nginx safety net).
  client_max_body_size 25m;

  sendfile on;
  keepalive_timeout 65;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json;

  server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets — aggressive caching for hashed filenames.
    location /assets/ {
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    # SurrealDB WebSocket proxy.
    # Only nginx port (80/443) is publicly exposed; SurrealDB runs on internal
    # Docker network only.
    location /surreal/ {
      proxy_pass         http://surreal:8000/;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;
      proxy_read_timeout 86400s;
      proxy_send_timeout 86400s;
    }

    # SPA fallback — all non-asset requests serve index.html.
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
