services:
  surrealdb:
    # 数据表运行时依赖 3.0.5 已验证的 DDL + DML 混合事务提交/回滚语义。
    image: surrealdb/surrealdb:3.0.5
    command: start --user root --pass root memory
    ports:
      - "8000:8000"

  server:
    build: .
    depends_on:
      - surrealdb
    env_file:
      - .env.example
    environment:
      SURREAL_URL: ws://surrealdb:8000/rpc
      SURREAL_ROOT_USER: root
      SURREAL_ROOT_PASS: root
    ports:
      - "8080:8080"
